# Evi + Ollama, glued together for a self-hosted AI server.
#
# Bring it up:
#   docker compose up -d
# Then pull a model into Ollama (once):
#   docker compose exec ollama ollama pull qwen2.5:14b-instruct-q4_K_M
# And point Evi at it:
#   docker compose exec evi evi models use qwen2.5:14b-instruct-q4_K_M
#
# State lives in named volumes so it survives `docker compose down`.

version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: evi-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # If you have an NVIDIA GPU on the host, uncomment the next block
    # AFTER installing the NVIDIA Container Toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  evi:
    build: .
    image: evi:latest
    container_name: evi-web
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      # Evi configures via ~/.evi/config.toml — but env can override common bits.
      # See evi/config.py for the full list.
      EVI_HOME: /root/.evi
    volumes:
      - evi-state:/root/.evi
    # First-run hint: shell into the container and write a config that points
    # at the sibling ollama service.
    #
    #   docker compose exec evi sh -c 'mkdir -p /root/.evi && cat > /root/.evi/config.toml <<EOF
    #   [llm]
    #   backend  = "ollama"
    #   base_url = "http://ollama:11434/v1"
    #   model    = "qwen2.5:14b-instruct-q4_K_M"
    #   EOF'

volumes:
  ollama-data:
  evi-state:
