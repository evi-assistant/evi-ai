# cargo-deny config for the Evi desktop crate.
#
# CI (.github/workflows/security.yml) runs `cargo deny check advisories` — the
# RustSec vulnerability gate. The licenses / bans / sources sections below are
# here for local `cargo deny check` and a future CI tightening; they are not
# enforced in CI yet (Tauri's dep tree is large and license/duplicate gating
# is noisy until tuned).

[advisories]
version = 2
# Fail on yanked crates too. Add RUSTSEC-XXXX-YYYY ids to `ignore` to accept
# a specific advisory (with a comment explaining why).
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
]
confidence-threshold = 0.9

[bans]
# Tauri trees commonly carry duplicate versions; warn rather than deny.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
