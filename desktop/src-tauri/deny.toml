# cargo-deny config for the Evi desktop crate.
#
# CI's RustSec *vulnerability* gate uses `cargo-audit` (see
# .github/workflows/security.yml) — it ignores the "unmaintained" advisories
# that Tauri's transitive GTK3 tree (atk/gdk/gtk) trips, with no upgrade path.
# This deny.toml is for local `cargo deny check` and a FUTURE CI tightening
# (license + duplicate-version + source gating, which is noisier and needs
# tuning against Tauri's large dep tree before enforcing). Not used by CI yet.

[advisories]
version = 2
# Fail on yanked crates too. Add RUSTSEC-XXXX-YYYY ids to `ignore` to accept
# a specific advisory (with a comment explaining why).
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "BSL-1.0",
]
confidence-threshold = 0.9

[bans]
# Tauri trees commonly carry duplicate versions; warn rather than deny.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
