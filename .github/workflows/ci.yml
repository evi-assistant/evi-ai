name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1"   # weekly full cross-platform sweep (Mon 07:00 UTC)
  workflow_dispatch:

jobs:
  test:
    name: pytest + ruff (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Every push to main runs ONE cheap Ubuntu/py3.13 job; the full
      # 3-OS matrix runs on PRs, the weekly schedule, and manual dispatch.
      # macOS bills at ~10×, so full-matrix-on-every-push was the bulk of our
      # Actions minutes — this keeps coverage where it matters (PRs + weekly)
      # at a fraction of the cost. (Python is 3.13-only since the 0.35.0 floor.)
      matrix:
        os: ${{ (github.event_name == 'push') && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "windows-latest", "macos-latest"]') }}
        python: ["3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web,mcp,scheduler,downloads,web-tools,index]"

      - name: Ruff
        run: python -m ruff check evi tests scripts

      - name: Pytest
        run: python -m pytest -q --timeout=30
