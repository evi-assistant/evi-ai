name: docker

# Build + publish the eVi container image (Phase 93). Runs on version tags and
# on manual dispatch; pushes to GHCR as ghcr.io/<owner>/<repo>. The Dockerfile
# is two-stage and ships the web server + scheduler extras (no LLM backend —
# point the container at your own).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push:
        description: "Push to GHCR (off = build only)"
        type: boolean
        default: false

permissions:
  contents: read
  packages: write   # push to GHCR

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Only log in when we intend to push (tag builds, or dispatch with push=true).
      - name: Log in to GHCR
        if: github.event_name == 'push' || inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}

      - name: Build (and push on tags / opt-in dispatch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
