name: security

# Dependency vulnerability scanning. Complements Dependabot (which opens
# upgrade PRs): this gates the build on known advisories and re-scans weekly
# so newly-disclosed CVEs in unchanged deps still surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Audit the resolved runtime surface (core + the commonly-installed
      # extras). The heavy GPU extras (stt/computer/rerank → torch/av/…) are
      # intentionally excluded to keep the job fast; revisit if we want them
      # covered. setuptools/wheel are upgraded so the venv's bundled build
      # tools don't generate stale, non-runtime advisories.
      - name: Install project + extras
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,web,mcp,scheduler,downloads,web-tools,index,pdf,calendar,email]"
          python -m pip install pip-audit

      - name: pip-audit
        run: pip-audit --desc

  rust-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # RustSec vulnerability gate for the desktop crate. cargo-audit fails the
      # build on actual *vulnerabilities* but treats "unmaintained"/"unsound"
      # advisories as warnings (exit 0) — important here because Tauri's Linux
      # GTK3 binding tree (atk/gdk/gtk via gtk3-rs) is flagged unmaintained with
      # no upgrade path. License/ban/duplicate policy lives in
      # desktop/src-tauri/deny.toml for local `cargo deny check` / future use.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo-audit (vulnerabilities only)
        run: cargo audit --file desktop/src-tauri/Cargo.lock

  secret-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan full history, not just the tip

      # Pin the open-source binary directly — avoids the gitleaks-action license
      # gate and works the same on public or private repos.
      - name: Install gitleaks
        run: |
          VER=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source . --no-banner --redact --config .gitleaks.toml

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write   # used only when GHAS code-scanning is available
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # GHAS isn't free on private repos, so don't push to code-scanning; run
      # the analysis and publish the SARIF as a build artifact instead. On a
      # public repo (or with GHAS) flip `upload: true` to get the Security tab.
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: false
          output: codeql-results

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-${{ matrix.language }}
          path: codeql-results
          if-no-files-found: warn
