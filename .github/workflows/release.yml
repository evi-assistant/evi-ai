name: release

on:
  push:
    tags:
      - "v*.*.*"
  # Manual re-publish (e.g. when a tag's release run failed before the publish
  # step). Builds + publishes whatever version is in pyproject on the chosen ref.
  workflow_dispatch: {}

permissions:
  contents: write   # for the GitHub release
  id-token: write   # PyPI Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Sanity-check version matches tag
        if: github.event_name == 'push'  # workflow_dispatch has no tag — publish pyproject version as-is
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pyver=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          initver=$(python -c "import re, pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('evi/__init__.py').read_text()).group(1))")
          [ "$tag" = "$pyver" ] || (echo "tag $tag != pyproject $pyver"; exit 1)
          [ "$pyver" = "$initver" ] || (echo "pyproject $pyver != evi/__init__.py $initver — bump both files"; exit 1)

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Install test + lint deps
        run: python -m pip install -e ".[dev,web,mcp,scheduler,downloads,web-tools,index]"

      # Lint gates the publish, mirroring ci.yml's Install -> Ruff -> Pytest order
      # (lint is cheap, so it fails fast). Without this, ci.yml was the only thing
      # running ruff, and it does not block release.yml — which is how 1.0.14
      # published to PyPI with two E702 errors on main.
      - name: Ruff
        run: python -m ruff check evi tests scripts

      - name: Run the test suite
        run: pytest -q --timeout=30

      # Trusted Publishing also generates PEP 740 (sigstore) attestations for
      # the uploaded files on PyPI by default.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      # Keyless (OIDC) sigstore signing of the release artifacts (Phase 94).
      # Runs AFTER the PyPI upload so the *.sigstore.json bundles aren't sent to
      # PyPI; they ride along on the GitHub Release for independent verification:
      #   python -m sigstore verify identity evi_assistant-X-py3-none-any.whl \
      #     --bundle evi_assistant-X-py3-none-any.whl.sigstore.json \
      #     --cert-identity <release-workflow-url> \
      #     --cert-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign artifacts (sigstore)
        # Pin to a published release tag — this action does not maintain a
        # floating `@v3` major tag, so `@v3` fails to resolve (broke 0.32.0).
        uses: sigstore/gh-action-sigstore-python@v3.4.0
        with:
          inputs: ./dist/*.tar.gz ./dist/*.whl

      - name: GitHub Release
        if: github.event_name == 'push'  # needs a tag; PyPI publish above already ran
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/*.sigstore.json

  # Every PyPI `v*` release ALSO cuts the matching desktop release (the frozen
  # sidecar re-built from this commit's `evi/` source), so the desktop channel
  # never drifts behind the core. Runs AFTER build-and-publish, so the desktop
  # release publishes last and `releases/latest` (the in-app updater's endpoint)
  # resolves to it — carrying latest.json. Skipped on manual workflow_dispatch
  # (no version tag to derive the desktop version from). Free on public runners.
  desktop:
    needs: build-and-publish
    if: github.event_name == 'push'
    permissions:
      contents: write
    uses: ./.github/workflows/desktop-release.yml
    with:
      release_tag: desktop-${{ github.ref_name }}
    secrets: inherit
