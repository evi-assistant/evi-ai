name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # for the GitHub release
  id-token: write   # PyPI Trusted Publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sanity-check version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          pyver=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          [ "$tag" = "$pyver" ] || (echo "tag $tag != pyproject $pyver"; exit 1)

      - name: Install build deps
        run: python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Run the test suite
        run: |
          python -m pip install -e ".[dev,web,mcp,scheduler,downloads,web-tools,index]"
          pytest -q --timeout=30

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.whl
