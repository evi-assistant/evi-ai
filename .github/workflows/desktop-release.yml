name: desktop-release

# Builds the standalone Tauri desktop installers (the frozen-sidecar bundle,
# no Python needed on the target) for Windows / macOS / Linux and attaches
# them to a GitHub release.
#
# The desktop app versions INDEPENDENTLY of the Python package (tauri.conf.json
# `version`, currently 1.0.0) — so this is driven by its own `desktop-v*` tags,
# not the PyPI `v*.*.*` tags that `release.yml` watches. Cut a desktop release:
#
#     git tag desktop-v1.0.0 && git push origin desktop-v1.0.0
#
# Or run it manually from the Actions tab (workflow_dispatch) to produce
# downloadable build artifacts without creating a release.
#
# All three OSes ship as of the public 1.0.0 release: the matrix builds
# Windows / macOS / Linux and publishes a single NON-DRAFT release with
# minisign-signed installers + latest.json. `fail-fast: false` keeps a working
# OS's artifacts even if another OS's job fails.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish a release to (e.g. desktop-v1.0.0). Leave blank for an artifacts-only build."
        required: false
        default: ""

permissions:
  contents: write   # create the GitHub release + upload installers

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Full cross-platform matrix. Free on a PUBLIC repo's standard runners
        # (incl. macOS), so we build Windows + macOS + Linux every release.
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      # Tauri's Linux runtime/build deps (WebView via webkit2gtk). Tauri 2
      # needs the 4.1 series; ubuntu-latest carries it.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            build-essential

      # Build the frozen "practical tier" sidecar in an ISOLATED venv so a
      # fat dev env can't drag torch/av/sounddevice into it (see
      # docs/desktop-bundling.md). The build scripts auto-prefer .venv-build.
      - name: Build sidecar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv .venv-build
          .\.venv-build\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-build\Scripts\python.exe -m pip install -e ".[web,pdf,index,build-desktop]"
          .\scripts\build-sidecar.ps1
          .\desktop\src-tauri\binaries\evi-server\evi-server.exe --check

      - name: Build sidecar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python -m venv .venv-build
          ./.venv-build/bin/python -m pip install --upgrade pip
          ./.venv-build/bin/python -m pip install -e ".[web,pdf,index,build-desktop]"
          chmod +x scripts/build-sidecar.sh
          ./scripts/build-sidecar.sh
          ./desktop/src-tauri/binaries/evi-server/evi-server --check

      - name: Install desktop npm deps
        working-directory: desktop
        run: npm install

      # Resolve the release tag: the pushed tag on a tag event, or the manual
      # input on workflow_dispatch (empty -> tauri-action builds without
      # creating a release; we still upload artifacts below).
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      # The Windows Tauri NSIS bundler downloads its toolchain from GitHub at
      # bundle time and has been intermittently returning HTTP 504 (the
      # "failed to bundle project `http status: 504`" failures). Run the build
      # once with retries first: the Rust compile is cached so re-tries are
      # cheap (only the bundle step re-runs), and a successful run warms
      # Tauri's bundler cache so the real release step below won't hit the
      # flaky download. `continue-on-error` so a sustained outage still falls
      # through to the release step (no worse than before).
      - name: Warm bundler cache (retry transient 504s, Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 20
          max_attempts: 3
          retry_wait_seconds: 45
          shell: pwsh
          command: npm --prefix desktop run tauri build -- --config src-tauri/tauri.standalone.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build app + (maybe) publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — produces the .sig files + latest.json the
          # in-app updater verifies (pubkey is in tauri.conf.json). Without
          # these the build still succeeds but emits no updater artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          # Standalone overlay: ships the onedir sidecar via bundle.resources.
          args: --config src-tauri/tauri.standalone.conf.json
          # Empty tagName => build only, no release (artifacts uploaded below).
          tagName: ${{ steps.tag.outputs.name }}
          releaseName: "eVi Desktop ${{ steps.tag.outputs.name }}"
          # Published (not draft): on a PUBLIC repo the in-app updater fetches
          # these release assets directly — no separate mirror repo needed.
          releaseDraft: false
          prerelease: false
          releaseBody: |
            Standalone eVi Desktop installers (frozen server bundled — no Python
            required on the target machine). Built by `desktop-release.yml`.

            > Updater-signed (minisign) but NOT OS-code-signed yet, so Windows
            > SmartScreen / macOS Gatekeeper still warn on first run. Tracked in
            > docs/releasing.md.

      # Always upload the built bundles as workflow artifacts too, so manual
      # (untagged) runs still produce something downloadable.
      - name: Upload installers as artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evi-desktop-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.sig
            desktop/src-tauri/target/release/**/latest.json
