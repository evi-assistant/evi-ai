version: 2

# Weekly, grouped dependency PRs. Minor+patch are grouped into one PR per
# ecosystem to keep noise down; majors come individually (they need eyes).
# Conventional-Commit prefixes match the repo convention.
updates:
  # Python — root pyproject.toml (+ extras)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "build"
      include: "scope"

  # Rust — the Tauri desktop crate
  - package-ecosystem: "cargo"
    directory: "/desktop/src-tauri"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "build"
      include: "scope"

  # GitHub Actions used across the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    groups:
      actions-all:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"
